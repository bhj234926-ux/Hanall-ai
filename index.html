<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#151513">
<title>HANALL AI - AI 벽 자동 인식</title>
<style>
:root{font-family:Arial,"Noto Sans KR",sans-serif;--bg:#f1efe9;--ink:#191916;--muted:#77736b;--line:#ded9cf;--dark:#171714}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,input{font:inherit}
header{height:66px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:20}
.brand{font-weight:900}.brand small{display:block;font-size:9px;color:#8b887f;letter-spacing:1.4px;margin-top:3px}
header button,.btn{border:0;border-radius:13px;padding:12px 14px;font-weight:800}.dark{background:var(--dark);color:#fff}.light{background:#e9e6de;color:#222}
main{max-width:1250px;margin:auto;padding:14px}.card{background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 18px 50px rgba(25,25,15,.08)}
.start{min-height:calc(100vh - 96px);display:grid;place-items:center;text-align:center;padding:34px}.start h1{font-size:clamp(34px,8vw,62px);letter-spacing:-3px;line-height:1.05;margin:20px 0 12px}.start p{color:var(--muted);line-height:1.65}.actions{display:grid;gap:10px;max-width:410px;margin:24px auto 0}.actions button{padding:17px;border:0;border-radius:16px;font-weight:800;font-size:17px}
.editor{display:none}.editor.show{display:grid;grid-template-columns:310px 1fr;min-height:calc(100vh - 96px)}
.side{padding:15px;border-right:1px solid var(--line);overflow:auto}.side h2{font-size:18px;margin:4px 0}.side p{font-size:12px;color:var(--muted);line-height:1.55;margin:5px 0 14px}
.materials{display:grid;grid-template-columns:1fr 1fr;gap:9px}.material{padding:0;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff;text-align:left}.material.selected{outline:3px solid #151513}.material img{display:block;width:100%;height:78px;object-fit:cover}.material b{display:block;padding:8px 8px 2px;font-size:12px}.material small{display:block;padding:0 8px 9px;color:var(--muted)}
.workspace{display:grid;grid-template-rows:auto 1fr auto;min-width:0}.toolbar{padding:12px;border-bottom:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}.stage-wrap{background:#d7d4cd;display:grid;place-items:center;padding:14px;min-height:60vh}.stage{position:relative;width:min(100%,1000px);aspect-ratio:4/3;background:#bbb;border-radius:16px;overflow:hidden;box-shadow:0 16px 45px rgba(0,0,0,.17)}#room,#canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#aaa}#canvas{background:transparent;touch-action:none}
.hint{position:absolute;left:50%;top:12px;transform:translateX(-50%);background:rgba(0,0,0,.76);color:#fff;padding:9px 12px;border-radius:999px;font-size:11px;pointer-events:none;white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis}
.bottom{padding:12px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}.privacy{font-size:11px;color:var(--muted);margin-top:12px}.hidden{display:none!important}
.ai-status{margin:0 0 14px;padding:11px 12px;border-radius:13px;background:#f4f1e9;font-size:12px;line-height:1.5}.ai-status strong{display:block;margin-bottom:3px}.loader{height:7px;border-radius:999px;background:#ded9cf;overflow:hidden;margin-top:8px}.loader span{display:block;width:35%;height:100%;background:#171714;animation:move 1.1s infinite ease-in-out}@keyframes move{0%{transform:translateX(-110%)}100%{transform:translateX(310%)}}
@media(max-width:850px){main{padding:7px}.card{border-radius:17px}.editor.show{display:flex;flex-direction:column}.side{order:2;border-right:0;border-top:1px solid var(--line)}.workspace{order:1}.stage-wrap{min-height:52vh;padding:7px}.materials{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header><div class="brand">HANALL AI<small>REAL TEXTURE + AI WALL DETECTION v0.5</small></div><button id="reset" class="dark">처음으로</button></header>
<main><section class="card">
<div id="start" class="start"><div><div style="font-size:48px">⌂</div><h1>사진 한 장으로<br>벽을 자동 인식</h1><p>공간 사진을 선택하면 AI가 벽 영역을 찾아<br>개나리 PDF의 실제 자재 텍스처를 적용합니다.</p><div class="actions"><button id="cameraBtn" class="dark">📷 사진 촬영하기</button><button id="albumBtn" class="light">🖼 앨범에서 선택하기</button></div><div class="privacy">사진은 서버에 업로드하지 않습니다. AI 모델은 브라우저에서 실행됩니다.</div></div></div>

<div id="editor" class="editor">
<aside class="side">
<h2>개나리 57231 컬렉션</h2>
<p>PDF에서 추출한 실제 샘플 이미지입니다.</p>
<div id="aiStatus" class="ai-status"><strong>AI 준비</strong><span id="aiText">사진을 올리면 벽을 자동 분석합니다.</span><div id="loader" class="loader hidden"><span></span></div></div>
<div id="materials" class="materials"></div>
</aside>
<section class="workspace">
<div class="toolbar">
<button id="aiBtn" class="btn dark">AI 벽 자동 인식</button>
<button id="areaBtn" class="btn light">수동 4점 보정</button>
<button id="beforeBtn" class="btn light">원본 보기</button>
<button id="afterBtn" class="btn light">적용 보기</button>
<button id="saveBtn" class="btn light">결과 저장</button>
<button id="changeBtn" class="btn light">사진 변경</button>
</div>
<div class="stage-wrap"><div class="stage"><img id="room" alt="공간 사진"><canvas id="canvas"></canvas><div id="hint" class="hint">사진을 선택하면 AI 분석이 자동 시작됩니다</div></div></div>
<div class="bottom"><strong id="selectedLabel">57231-1</strong> · AI 벽 마스크 적용 · 실패 시 수동 보정 가능</div>
</section>
</div>
</section></main>
<input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment">
<input id="albumInput" class="hidden" type="file" accept="image/*">

<script type="module">
const products=[
{code:'57231-1',src:'assets/textures/57231-1.jpg'},{code:'57231-2',src:'assets/textures/57231-2.jpg'},
{code:'57231-3',src:'assets/textures/57231-3.jpg'},{code:'57231-4',src:'assets/textures/57231-4.jpg'},
{code:'57231-5',src:'assets/textures/57231-5.jpg'},{code:'57231-6',src:'assets/textures/57231-6.jpg'},
{code:'57231-7',src:'assets/textures/57231-7.jpg'}];

const start=document.getElementById('start'),editor=document.getElementById('editor'),room=document.getElementById('room'),
canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),hint=document.getElementById('hint'),
aiText=document.getElementById('aiText'),loader=document.getElementById('loader');

let selected=products[0],texture=new Image(),points=[],manual=false,showAfter=true;
let wallMask=null,segmenter=null,modelLoading=false,currentDataUrl='';

function renderMaterials(){
 const box=document.getElementById('materials');box.innerHTML='';
 products.forEach(p=>{
   const b=document.createElement('button');
   b.className='material '+(p.code===selected.code?'selected':'');
   b.innerHTML=`<img src="${p.src}" alt="${p.code}"><b>${p.code}</b><small>GNI 개나리</small>`;
   b.onclick=()=>{selected=p;loadTexture();renderMaterials();document.getElementById('selectedLabel').textContent=p.code};
   box.appendChild(b);
 });
}
function loadTexture(){texture=new Image();texture.onload=draw;texture.src=selected.src}
function openPicker(input){input.value='';input.click()}

function setStatus(title,text,loading=false){
 document.querySelector('#aiStatus strong').textContent=title;
 aiText.textContent=text;
 loader.classList.toggle('hidden',!loading);
}

async function loadPhoto(file){
 if(!file)return;
 const r=new FileReader();
 r.onload=e=>{
   currentDataUrl=e.target.result;
   room.src=currentDataUrl;
   room.onload=async()=>{
     canvas.width=room.naturalWidth;canvas.height=room.naturalHeight;
     points=[];wallMask=null;manual=false;showAfter=true;
     start.classList.add('hidden');editor.classList.add('show');
     draw();
     await detectWall();
   };
 };
 r.readAsDataURL(file);
}

async function getSegmenter(){
 if(segmenter)return segmenter;
 if(modelLoading) {
   while(modelLoading) await new Promise(r=>setTimeout(r,200));
   return segmenter;
 }
 modelLoading=true;
 setStatus('AI 모델 불러오는 중','최초 1회는 모델 다운로드 때문에 시간이 걸릴 수 있습니다.',true);
 try{
   const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.2');
   env.allowLocalModels=false;
   segmenter=await pipeline('image-segmentation','Xenova/segformer-b0-finetuned-ade-512-512',{
     progress_callback:(p)=>{
       if(p.status==='progress' && p.total){
         const pct=Math.round((p.loaded/p.total)*100);
         aiText.textContent=`AI 모델 다운로드 ${pct}%`;
       }
     }
   });
   return segmenter;
 } finally {modelLoading=false}
}

async function detectWall(){
 if(!currentDataUrl)return;
 manual=false;points=[];wallMask=null;draw();
 hint.textContent='AI가 벽을 찾는 중입니다...';
 setStatus('AI 분석 중','벽, 바닥, 천장과 가구를 구분하고 있습니다.',true);
 try{
   const seg=await getSegmenter();
   const result=await seg(currentDataUrl,{subtask:'semantic'});
   const walls=result.filter(x=>String(x.label).toLowerCase().includes('wall'));
   if(!walls.length) throw new Error('벽 클래스를 찾지 못했습니다.');
   wallMask=mergeMasks(walls.map(x=>x.mask),canvas.width,canvas.height);
   const coverage=maskCoverage(wallMask);
   if(coverage<0.03) throw new Error('인식된 벽 영역이 너무 작습니다.');
   setStatus('벽 자동 인식 완료',`벽 영역 약 ${Math.round(coverage*100)}%를 인식했습니다. 자재를 선택해 비교하세요.`,false);
   hint.textContent='AI 벽 인식 완료 · 필요하면 수동 4점 보정을 사용하세요';
   draw();
 }catch(err){
   console.error(err);
   wallMask=makeFallbackMask(canvas.width,canvas.height);
   setStatus('간편 자동 인식 적용','AI 모델 실행이 어렵거나 벽을 찾지 못해 기본 실내 벽 영역을 적용했습니다. 수동 보정으로 정확하게 수정할 수 있습니다.',false);
   hint.textContent='자동 추정 적용 · 정확하지 않으면 수동 4점 보정';
   draw();
 }
}

function mergeMasks(masks,w,h){
 const off=document.createElement('canvas');off.width=w;off.height=h;
 const c=off.getContext('2d');c.fillStyle='#000';c.fillRect(0,0,w,h);
 for(const m of masks){
   const mw=m.width,mh=m.height,data=m.data;
   const tmp=document.createElement('canvas');tmp.width=mw;tmp.height=mh;
   const tc=tmp.getContext('2d'),img=tc.createImageData(mw,mh);
   for(let i=0;i<mw*mh;i++){
     const v=data[i*(m.channels||1)]>0?255:0;
     img.data[i*4]=img.data[i*4+1]=img.data[i*4+2]=255;img.data[i*4+3]=v;
   }
   tc.putImageData(img,0,0);c.drawImage(tmp,0,0,w,h);
 }
 return c.getImageData(0,0,w,h);
}

function makeFallbackMask(w,h){
 const off=document.createElement('canvas');off.width=w;off.height=h;
 const c=off.getContext('2d');
 c.fillStyle='#000';c.fillRect(0,0,w,h);
 c.fillStyle='#fff';
 c.beginPath();c.moveTo(w*.04,h*.06);c.lineTo(w*.96,h*.06);c.lineTo(w*.91,h*.73);c.lineTo(w*.09,h*.73);c.closePath();c.fill();
 return c.getImageData(0,0,w,h);
}

function maskCoverage(mask){
 let n=0;for(let i=3;i<mask.data.length;i+=4)if(mask.data[i]>20 || mask.data[i-3]>20)n++;
 return n/(mask.width*mask.height);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 if(showAfter && texture.complete){
   if(manual && points.length===4) drawTexturePolygon();
   else if(wallMask) drawTextureMask();
 }
 if(manual) drawManualPoints();
}

function textureLayer(){
 const layer=document.createElement('canvas');layer.width=canvas.width;layer.height=canvas.height;
 const c=layer.getContext('2d');
 const scale=Math.max(.5,canvas.width/1700);
 const pat=c.createPattern(texture,'repeat');
 c.save();c.scale(scale,scale);c.fillStyle=pat;c.fillRect(0,0,layer.width/scale,layer.height/scale);c.restore();
 c.globalCompositeOperation='multiply';c.globalAlpha=.28;c.drawImage(room,0,0,layer.width,layer.height);
 return layer;
}

function drawTextureMask(){
 const layer=textureLayer();
 const maskCanvas=document.createElement('canvas');maskCanvas.width=canvas.width;maskCanvas.height=canvas.height;
 maskCanvas.getContext('2d').putImageData(wallMask,0,0);
 const out=document.createElement('canvas');out.width=canvas.width;out.height=canvas.height;
 const o=out.getContext('2d');o.drawImage(layer,0,0);o.globalCompositeOperation='destination-in';o.drawImage(maskCanvas,0,0);
 ctx.globalAlpha=.9;ctx.drawImage(out,0,0);ctx.globalAlpha=1;
}

function drawTexturePolygon(){
 const layer=textureLayer();
 ctx.save();ctx.beginPath();ctx.moveTo(...points[0]);for(let i=1;i<4;i++)ctx.lineTo(...points[i]);ctx.closePath();ctx.clip();ctx.globalAlpha=.9;ctx.drawImage(layer,0,0);ctx.restore();ctx.globalAlpha=1;
}

function drawManualPoints(){
 ctx.save();ctx.strokeStyle='#ff3b30';ctx.fillStyle='#fff';ctx.lineWidth=Math.max(3,canvas.width/400);
 if(points.length){ctx.beginPath();ctx.moveTo(...points[0]);for(let i=1;i<points.length;i++)ctx.lineTo(...points[i]);ctx.stroke()}
 points.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],Math.max(7,canvas.width/180),0,Math.PI*2);ctx.fill();ctx.stroke()});ctx.restore();
}

canvas.addEventListener('pointerdown',e=>{
 if(!manual)return;
 const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width,y=(e.clientY-r.top)*canvas.height/r.height;
 if(points.length>=4)points=[];
 points.push([x,y]);hint.textContent=`벽 모서리 ${points.length}/4 선택`;
 if(points.length===4){hint.textContent='수동 벽 영역 적용 완료';}
 draw();
});

document.getElementById('aiBtn').onclick=detectWall;
document.getElementById('areaBtn').onclick=()=>{manual=true;points=[];showAfter=true;hint.textContent='벽 모서리 4곳을 차례로 눌러주세요';setStatus('수동 보정','네 점으로 벽 영역을 직접 지정합니다.',false);draw()};
document.getElementById('beforeBtn').onclick=()=>{showAfter=false;draw()};
document.getElementById('afterBtn').onclick=()=>{showAfter=true;draw()};
document.getElementById('saveBtn').onclick=()=>{
 const out=document.createElement('canvas');out.width=canvas.width;out.height=canvas.height;
 const c=out.getContext('2d');c.drawImage(room,0,0,out.width,out.height);c.drawImage(canvas,0,0);
 const a=document.createElement('a');a.download=`HANALL_${selected.code}.jpg`;a.href=out.toDataURL('image/jpeg',.94);a.click();
};
function reset(){editor.classList.remove('show');start.classList.remove('hidden');room.removeAttribute('src');points=[];wallMask=null;currentDataUrl=''}
document.getElementById('reset').onclick=reset;
document.getElementById('cameraBtn').onclick=()=>openPicker(cameraInput);
document.getElementById('albumBtn').onclick=()=>openPicker(albumInput);
document.getElementById('changeBtn').onclick=()=>openPicker(albumInput);
cameraInput.onchange=e=>loadPhoto(e.target.files[0]);
albumInput.onchange=e=>loadPhoto(e.target.files[0]);
renderMaterials();loadTexture();
</script>
</body></html>
