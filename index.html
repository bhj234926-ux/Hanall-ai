<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#11110f">
<title>HANALL AI</title>
<style>
:root{font-family:Arial,'Noto Sans KR',sans-serif;color:#191916;background:#f3f1eb}*{box-sizing:border-box}body{margin:0}button,input{font:inherit}.app{min-height:100vh}.top{height:68px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1px solid #ddd9cf;position:sticky;top:0;z-index:10}.brand{font-weight:800}.brand small{display:block;font-size:9px;letter-spacing:1.5px;color:#89867d;margin-top:3px}.pill{border:0;border-radius:999px;background:#171714;color:#fff;padding:10px 14px}.wrap{max-width:1200px;margin:auto;padding:16px}.hero{background:#fff;border:1px solid #dedad1;border-radius:26px;overflow:hidden;box-shadow:0 20px 60px rgba(30,30,20,.08)}.screen{display:none}.screen.active{display:block}.empty{min-height:calc(100vh - 120px);padding:34px 20px;display:grid;place-items:center;text-align:center}.empty-inner{max-width:560px}.icon{width:72px;height:72px;border-radius:24px;background:#181815;color:#fff;display:grid;place-items:center;margin:auto;font-size:32px}.empty h1{font-size:clamp(34px,8vw,64px);letter-spacing:-3px;margin:24px 0 12px}.empty p{color:#747168;line-height:1.7;margin:0 0 26px}.actions{display:grid;gap:12px;max-width:420px;margin:auto}.action{border:0;border-radius:16px;padding:17px;font-weight:700;font-size:17px}.camera{background:#171714;color:#fff}.album{background:#ece9e1;color:#222}.privacy{display:flex;justify-content:center;gap:7px;color:#77746b;font-size:12px;margin-top:18px}.content{padding:18px}.grid{display:grid;grid-template-columns:1.4fr .6fr;gap:16px}.stage{position:relative;min-height:68vh;border-radius:20px;overflow:hidden;background:#ddd}.stage img{width:100%;height:100%;position:absolute;inset:0;object-fit:cover}.shade{position:absolute;inset:0;mix-blend-mode:multiply;pointer-events:none}.badge{position:absolute;left:14px;top:14px;background:rgba(20,20,18,.78);color:#fff;border-radius:999px;padding:8px 11px;font-size:11px}.side{display:flex;flex-direction:column;gap:12px}.panel{border:1px solid #dedad1;border-radius:18px;padding:16px}.panel h2{margin:0 0 6px;font-size:18px}.panel p{margin:0;color:#77746b;font-size:13px;line-height:1.5}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.row button{border:0;border-radius:14px;padding:13px;font-weight:700}.dark{background:#171714;color:#fff}.light{background:#ece9e1}.progress-wrap{height:10px;background:#ece9e1;border-radius:999px;overflow:hidden;margin-top:14px}.progress{height:100%;width:0;background:#171714;transition:.35s}.status{font-size:12px;color:#77746b;margin-top:8px}.swatches{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.swatch{border:1px solid #dedad1;border-radius:14px;padding:9px;background:#fff;text-align:left}.swatch span{display:block;height:58px;border-radius:10px;margin-bottom:7px}.swatch b{font-size:13px}.swatch small{display:block;color:#77746b;margin-top:2px}.swatch.selected{outline:3px solid #171714}.notice{background:#f5f1e7;border-radius:14px;padding:13px 15px;color:#5f5c54;font-size:12px}.hidden{display:none!important}@media(max-width:820px){.wrap{padding:10px}.hero{border-radius:20px}.grid{grid-template-columns:1fr}.stage{min-height:62vh}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand">HANALL AI<small>INTERIOR VISUALIZER</small></div><button class="pill" id="resetTop">처음으로</button></header>
<main class="wrap"><section class="hero">
<div id="home" class="screen active empty"><div class="empty-inner"><div class="icon">⌂</div><h1>내 공간을<br>직접 찍어보세요</h1><p>실제 공간 사진을 촬영하거나 앨범에서 선택하면 바로 인테리어 미리보기를 시작할 수 있어요.</p><div class="actions"><button class="action camera" id="cameraBtn">📷 사진 촬영하기</button><button class="action album" id="albumBtn">🖼 앨범에서 선택하기</button></div><div class="privacy">🔒 사진은 서버에 저장되지 않고 이 기기에서만 표시됩니다.</div></div></div>
<div id="previewScreen" class="screen content"><div class="grid">
<div class="stage"><img id="preview" alt="고객 공간 사진"><div id="shade" class="shade"></div><span class="badge">고객 사진</span></div>
<aside class="side">
<div class="panel"><h2>사진 확인</h2><p>공간 전체가 잘 보이는지 확인해주세요.</p><div class="row"><button class="light" id="changeBtn">다른 사진</button><button class="dark" id="analyzeBtn">AI 분석 시작</button></div></div>
<div id="analysisPanel" class="panel hidden"><h2>공간 분석 중</h2><p>벽과 바닥 영역을 확인하고 있어요.</p><div class="progress-wrap"><div id="progress" class="progress"></div></div><div id="status" class="status">사진 준비 중...</div></div>
<div id="materialPanel" class="panel hidden"><h2>벽지 선택</h2><p>테스트용 색상을 눌러 분위기를 비교해보세요.</p><div class="swatches">
<button class="swatch selected" data-color="rgba(0,0,0,0)"><span style="background:#ece8de"></span><b>원본</b><small>Before</small></button>
<button class="swatch" data-color="rgba(224,214,195,.34)"><span style="background:#e0d6c3"></span><b>웜 베이지</b><small>HANALL 101</small></button>
<button class="swatch" data-color="rgba(205,210,202,.32)"><span style="background:#cdd2ca"></span><b>세이지 그레이</b><small>HANALL 102</small></button>
<button class="swatch" data-color="rgba(226,221,211,.30)"><span style="background:#e2ddd3"></span><b>오프화이트</b><small>HANALL 103</small></button>
</div></div>
<div class="notice">현재 버전은 사진 촬영·업로드와 화면 흐름을 확인하는 MVP입니다.</div>
</aside></div></div>
</section></main>
<input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment">
<input id="albumInput" class="hidden" type="file" accept="image/*">
</div>
<script>
const home=document.getElementById('home'),screen=document.getElementById('previewScreen'),preview=document.getElementById('preview'),cameraInput=document.getElementById('cameraInput'),albumInput=document.getElementById('albumInput'),analysisPanel=document.getElementById('analysisPanel'),materialPanel=document.getElementById('materialPanel'),progress=document.getElementById('progress'),statusEl=document.getElementById('status'),shade=document.getElementById('shade');
function pick(input){input.value='';input.click()}
function load(file){if(!file||!file.type.startsWith('image/'))return;const r=new FileReader();r.onload=e=>{preview.src=e.target.result;home.classList.remove('active');screen.classList.add('active');analysisPanel.classList.add('hidden');materialPanel.classList.add('hidden');progress.style.width='0%';shade.style.background='rgba(0,0,0,0)'};r.readAsDataURL(file)}
function reset(){preview.removeAttribute('src');screen.classList.remove('active');home.classList.add('active')}
function analyze(){analysisPanel.classList.remove('hidden');materialPanel.classList.add('hidden');const steps=[[20,'사진 해상도 확인 중...'],[45,'벽 영역 찾는 중...'],[70,'바닥과 가구 구분 중...'],[90,'미리보기 준비 중...'],[100,'분석 완료']];let i=0;const t=setInterval(()=>{progress.style.width=steps[i][0]+'%';statusEl.textContent=steps[i][1];i++;if(i>=steps.length){clearInterval(t);setTimeout(()=>materialPanel.classList.remove('hidden'),300)}},500)}
document.getElementById('cameraBtn').onclick=()=>pick(cameraInput);document.getElementById('albumBtn').onclick=()=>pick(albumInput);document.getElementById('changeBtn').onclick=()=>pick(albumInput);document.getElementById('resetTop').onclick=reset;document.getElementById('analyzeBtn').onclick=analyze;cameraInput.onchange=e=>load(e.target.files[0]);albumInput.onchange=e=>load(e.target.files[0]);
document.querySelectorAll('.swatch').forEach(b=>b.onclick=()=>{document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');shade.style.background=b.dataset.color});
</script>
</body>
</html>
